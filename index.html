
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Tarot — DSPy Training Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; background: #020617; }
    code, pre, .font-mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes pulse-slow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
    /* Mobile responsive */
    @media (max-width: 640px) {
      .hide-mobile { display: none !important; }
      pre { font-size: 12px !important; padding: 12px !important; }
      code { font-size: 11px !important; }
    }
    /* Horizontal scroll tab bar on mobile */
    .tab-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tab-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── Design System ──────────────────────────────────────────────────

function Badge({ children, variant = "default" }) {
  const styles = {
    default: "bg-amber-400/15 text-amber-300 border border-amber-400/20",
    blue: "bg-sky-400/15 text-sky-300 border border-sky-400/20",
    green: "bg-emerald-400/15 text-emerald-300 border border-emerald-400/20",
    purple: "bg-violet-400/15 text-violet-300 border border-violet-400/20",
    red: "bg-rose-400/15 text-rose-300 border border-rose-400/20",
    sky: "bg-sky-400/15 text-sky-300 border border-sky-400/20",
    violet: "bg-violet-400/15 text-violet-300 border border-violet-400/20",
    emerald: "bg-emerald-400/15 text-emerald-300 border border-emerald-400/20",
    amber: "bg-amber-400/15 text-amber-300 border border-amber-400/20",
    rose: "bg-rose-400/15 text-rose-300 border border-rose-400/20",
    slate: "bg-white/10 text-white/50 border border-white/10",
  };
  return (
    <span className={`inline-block px-2 py-0.5 rounded text-xs font-mono tracking-wide ${styles[variant] || styles.default}`}>
      {children}
    </span>
  );
}

function Code({ children }) {
  return (
    <code className="bg-white/5 border border-white/10 text-amber-300 px-1.5 py-0.5 rounded text-sm font-mono">
      {children}
    </code>
  );
}

function CodeBlock({ children, title }) {
  return (
    <div className="rounded-lg overflow-hidden border border-white/10 my-5">
      {title && (
        <div className="bg-white/5 px-4 py-2 border-b border-white/10 flex items-center gap-2">
          <div className="flex gap-1.5">
            <div className="w-2.5 h-2.5 rounded-full bg-rose-400/60" />
            <div className="w-2.5 h-2.5 rounded-full bg-amber-400/60" />
            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400/60" />
          </div>
          <span className="text-xs text-white/40 font-mono ml-2">{title}</span>
        </div>
      )}
      <pre className="bg-slate-950/80 p-4 overflow-x-auto text-sm leading-relaxed">
        <code className="text-slate-300 font-mono">{children}</code>
      </pre>
    </div>
  );
}

function Callout({ type = "info", title, children }) {
  const config = {
    info: { border: "border-sky-400/30", bg: "bg-sky-400/5", icon: "\u{1F4A1}", accent: "text-sky-300" },
    warn: { border: "border-amber-400/30", bg: "bg-amber-400/5", icon: "\u26A0\uFE0F", accent: "text-amber-300" },
    key: { border: "border-emerald-400/30", bg: "bg-emerald-400/5", icon: "\u{1F511}", accent: "text-emerald-300" },
    danger: { border: "border-rose-400/30", bg: "bg-rose-400/5", icon: "\u{1F6AB}", accent: "text-rose-300" },
  };
  const c = config[type];
  return (
    <div className={`${c.bg} ${c.border} border rounded-lg p-4 my-5`}>
      <div className={`font-semibold ${c.accent} mb-1 flex items-center gap-2 text-sm`}>
        <span>{c.icon}</span> {title}
      </div>
      <div className="text-white/70 text-sm leading-relaxed">{children}</div>
    </div>
  );
}

function SectionHeading({ children, sub }) {
  return (
    <div className="mb-4 sm:mb-5 mt-6 sm:mt-8 first:mt-0">
      <h2 className="text-lg sm:text-xl font-bold text-white tracking-tight">{children}</h2>
      {sub && <p className="text-white/40 text-xs sm:text-sm mt-1">{sub}</p>}
      <div className="h-px bg-gradient-to-r from-amber-400/40 to-transparent mt-3" />
    </div>
  );
}

// ─── Resource Links ─────────────────────────────────────────────────

function ResourceLink({ icon, label, path, desc, color = "sky" }) {
  const colors = {
    sky: "border-sky-400/20 bg-sky-400/5 hover:border-sky-400/40 text-sky-300",
    violet: "border-violet-400/20 bg-violet-400/5 hover:border-violet-400/40 text-violet-300",
    emerald: "border-emerald-400/20 bg-emerald-400/5 hover:border-emerald-400/40 text-emerald-300",
    amber: "border-amber-400/20 bg-amber-400/5 hover:border-amber-400/40 text-amber-300",
    rose: "border-rose-400/20 bg-rose-400/5 hover:border-rose-400/40 text-rose-300",
  };
  return (
    <div className={`border rounded-lg p-3 sm:p-4 transition-all cursor-pointer ${colors[color]}`}>
      <div className="flex items-center gap-2 sm:gap-3">
        <span className="text-base sm:text-lg">{icon}</span>
        <div className="flex-1 min-w-0">
          <div className={`font-semibold text-xs sm:text-sm ${colors[color].split(" ").pop()}`}>{label}</div>
          <div className="text-white/40 text-[10px] sm:text-xs mt-0.5 truncate">{path}</div>
        </div>
        <svg className="w-4 h-4 text-white/20 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
      </div>
      {desc && <p className="text-white/40 text-xs mt-2 leading-relaxed hidden sm:block">{desc}</p>}
    </div>
  );
}

// ─── File Tree ──────────────────────────────────────────────────────

function FileTree({ files }) {
  return (
    <div className="bg-white/[0.02] border border-white/10 rounded-lg p-4 my-4 font-mono text-xs">
      {files.map((f, i) => (
        <div key={i} className="flex items-center gap-2 py-0.5">
          <span className="text-white/20" style={{ paddingLeft: (f.depth || 0) * 16 }}>
            {f.type === "dir" ? "\u{1F4C1}" : "\u{1F4C4}"}
          </span>
          <span className={f.highlight ? "text-amber-300" : f.new ? "text-emerald-300" : "text-white/50"}>
            {f.name}
          </span>
          {f.badge && <Badge variant={f.badgeVariant || "slate"}>{f.badge}</Badge>}
          {f.note && <span className="text-white/20 ml-auto">{f.note}</span>}
        </div>
      ))}
    </div>
  );
}

// ─── Concept Card ───────────────────────────────────────────────────

function ConceptCard({ name, what, why, color = "sky" }) {
  const colors = {
    sky: "border-sky-400/20 bg-sky-400/[0.03]",
    violet: "border-violet-400/20 bg-violet-400/[0.03]",
    emerald: "border-emerald-400/20 bg-emerald-400/[0.03]",
    amber: "border-amber-400/20 bg-amber-400/[0.03]",
  };
  const textColors = { sky: "text-sky-300", violet: "text-violet-300", emerald: "text-emerald-300", amber: "text-amber-300" };
  return (
    <div className={`border rounded-lg p-4 ${colors[color]} my-3`}>
      <div className={`font-semibold text-sm ${textColors[color]} mb-2 font-mono`}>{name}</div>
      <div className="space-y-2 text-xs text-white/60 leading-relaxed">
        <div><span className="text-white/30 uppercase tracking-wider text-[10px] font-semibold">What </span>{what}</div>
        <div><span className="text-white/30 uppercase tracking-wider text-[10px] font-semibold">Why </span>{why}</div>
      </div>
    </div>
  );
}

// ─── Pipeline Diagram ───────────────────────────────────────────────

function AgentPipeline() {
  const [active, setActive] = useState(null);
  const agents = [
    {
      name: "QuestionAnalysisAgent", sig: "query, context \u2192 analysis",
      color: "sky", desc: "Interprets the user's question, identifies themes and emotional context before any cards are drawn.",
      fields: { in: ["query", "context"], out: ["analysis"] },
    },
    {
      name: "CardAnalysisAgent", sig: "card_name, position, reversed, query, profile \u2192 analysis",
      color: "violet", desc: "Interprets each drawn card individually: meaning, position context, reversal, and actionable insight. Runs once per card.",
      fields: { in: ["card_name", "card_position", "reversed_flag", "query", "reader_profile"], out: ["analysis"] },
      note: "\u00D7N cards",
    },
    {
      name: "ReadingSynthesisAgent", sig: "query, card_analyses, profile \u2192 final_reading",
      color: "amber", desc: "Weaves all individual card analyses into a cohesive narrative reading, addressing the original question.",
      fields: { in: ["query", "card_analyses", "reader_profile"], out: ["final_reading"] },
    },
  ];
  const cm = {
    sky: { bg: "bg-sky-400/10", border: "border-sky-400/40", text: "text-sky-300", glow: "shadow-sky-400/20" },
    violet: { bg: "bg-violet-400/10", border: "border-violet-400/40", text: "text-violet-300", glow: "shadow-violet-400/20" },
    amber: { bg: "bg-amber-400/10", border: "border-amber-400/40", text: "text-amber-300", glow: "shadow-amber-400/20" },
  };
  return (
    <div className="my-6">
      <div className="flex flex-col gap-3">
        {agents.map((a, i) => {
          const c = cm[a.color];
          const isActive = active === i;
          return (
            <div key={i}>
              <div className={`${c.bg} ${c.border} border rounded-lg p-4 cursor-pointer transition-all duration-300 ${isActive ? `shadow-lg ${c.glow}` : "hover:shadow-md"}`}
                onClick={() => setActive(isActive ? null : i)}>
                <div className="flex items-center gap-2 sm:gap-3">
                  <div className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full ${c.bg} ${c.border} border flex items-center justify-center font-mono font-bold ${c.text} text-xs sm:text-sm`}>
                    {i + 1}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className={`font-semibold ${c.text} text-xs sm:text-sm font-mono truncate`}>{a.name}</div>
                    <div className="text-white/40 text-[10px] sm:text-xs font-mono mt-0.5 truncate">{a.sig}</div>
                  </div>
                  {a.note && <Badge variant={a.color}>{a.note}</Badge>}
                  <svg className={`w-4 h-4 ${c.text} transition-transform duration-200 ${isActive ? "rotate-180" : ""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                </div>
                {isActive && (
                  <div className="mt-3 sm:mt-4 pt-3 border-t border-white/10">
                    <p className="text-white/60 text-xs sm:text-sm mb-3">{a.desc}</p>
                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 text-xs">
                      <div>
                        <div className="text-white/30 uppercase tracking-wider mb-1.5 font-semibold">Input Fields</div>
                        {a.fields.in.map((f, j) => (
                          <div key={j} className="text-white/50 flex items-center gap-1.5 mb-1 font-mono"><span className="text-emerald-400">\u2192</span> {f}</div>
                        ))}
                      </div>
                      <div>
                        <div className="text-white/30 uppercase tracking-wider mb-1.5 font-semibold">Output Fields</div>
                        {a.fields.out.map((f, j) => (
                          <div key={j} className="text-white/50 flex items-center gap-1.5 mb-1 font-mono"><span className={c.text}>\u2190</span> {f}</div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
              {i < agents.length - 1 && (
                <div className="flex justify-center py-1">
                  <div className="flex flex-col items-center gap-0.5">
                    <div className="w-px h-3 bg-white/20" />
                    <svg className="w-3 h-3 text-white/30" fill="currentColor" viewBox="0 0 12 12"><path d="M6 9L1 4h10L6 9z" /></svg>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Dependency Graph ───────────────────────────────────────────────

function DependencyGraph() {
  const levels = [
    { label: "Level 0: Foundation", color: "sky", items: ["Python Env", "78-Card Deck", "LLM Config"] },
    { label: "Level 1: DSPy Primitives", color: "violet", items: ["Spreads & Registry", "Signatures & Modules", "Multi-Field Signatures"] },
    { label: "Level 2: Composition", color: "amber", items: ["3-Agent Pipeline", "Personality System", "CLI"] },
    { label: "Level 3: Enrichment", color: "emerald", items: ["Astrology & Optional Fields", "Structured Output", "Reading History"] },
    { label: "Level 4: Surface", color: "rose", items: ["Gradio Web UI", "50 Unit Tests"] },
  ];
  const cm = {
    sky: "border-sky-400/20 bg-sky-400/5 text-sky-300",
    violet: "border-violet-400/20 bg-violet-400/5 text-violet-300",
    amber: "border-amber-400/20 bg-amber-400/5 text-amber-300",
    emerald: "border-emerald-400/20 bg-emerald-400/5 text-emerald-300",
    rose: "border-rose-400/20 bg-rose-400/5 text-rose-300",
  };
  return (
    <div className="space-y-3 my-6">
      {levels.map((lvl, i) => (
        <div key={i}>
          <div className="text-white/30 text-[10px] uppercase tracking-wider font-semibold mb-1.5 ml-1">{lvl.label}</div>
          <div className="flex flex-wrap gap-2">
            {lvl.items.map((item, j) => (
              <div key={j} className={`border rounded-md px-3 py-1.5 text-xs font-mono ${cm[lvl.color]}`}>{item}</div>
            ))}
          </div>
          {i < levels.length - 1 && (
            <div className="flex justify-center py-1">
              <div className="w-px h-3 bg-white/10" />
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// LESSON TABS

const LESSON_TABS = [
  { id: "overview", label: "Overview", num: "01" },
  { id: "walkthrough", label: "Walkthrough", num: "02" },
  { id: "code", label: "Code Reference", num: "03" },

// ─── Lesson 1 Content ───────────────────────────────────────────────

function Lesson01Overview() {
  return (
    <div className="fade-in">
      <SectionHeading sub="Start from zero. End with a working DSPy agent.">What You'll Build</SectionHeading>
      <p className="text-white/70 text-sm leading-relaxed mb-4">
        This lesson establishes the three foundation modules that everything else sits on top of. You'll model the 78-card tarot deck as pure data, configure DSPy to talk to an LLM, and build your first agent that analyzes questions using chain-of-thought reasoning.
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
        {[
          { title: "deck.py", desc: "78 cards, shuffle, draw, parse. Pure data \u2014 no dependencies, fully testable.", badge: "Data Layer", color: "sky" },
          { title: "llm.py", desc: "configure_llm() supporting OpenAI and Ollama via DSPy. Configure once, every agent inherits.", badge: "Config", color: "violet" },
          { title: "agents.py", desc: "QuestionAnalysisSig + QuestionAnalysisAgent. Your first Signature \u2192 Module \u2192 ChainOfThought.", badge: "First Agent", color: "amber" },
        ].map((item, i) => (
          <div key={i} className="border border-white/10 rounded-lg p-4 bg-white/[0.02]">
            <Badge variant={item.color}>{item.badge}</Badge>
            <div className="text-white/90 font-semibold text-sm mb-1 mt-2 font-mono">{item.title}</div>
            <p className="text-white/50 text-xs leading-relaxed">{item.desc}</p>
          </div>
        ))}
      </div>
      <SectionHeading sub="The four DSPy concepts you'll learn in this lesson">DSPy Concepts Introduced</SectionHeading>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <ConceptCard color="sky" name="dspy.settings.configure()" what="Global LLM configuration. Call once, every agent inherits it." why="Decouples model selection from agent logic. Switch from GPT-4o to Ollama in one line." />
        <ConceptCard color="violet" name="dspy.Signature" what="Typed I/O contracts that replace prompt templates. Declare inputs and outputs with names and types." why="You declare what you want, DSPy figures out how to prompt for it. No prompt engineering." />
        <ConceptCard color="emerald" name="dspy.Module" what="Composable agent building blocks. Wraps a Signature into a callable with forward()." why="Modules are the unit of composition. Pipelines are Modules calling Modules." />
        <ConceptCard color="amber" name="dspy.ChainOfThought" what="Step-by-step reasoning wrapper. Adds a 'reasoning' field before the output." why="The model shows its work before answering. Better accuracy on complex questions." />
      </div>
      <SectionHeading sub="What your project looks like after Lesson 1">File Structure</SectionHeading>
      <FileTree files={[
        { name: "nexus_tarot/", type: "dir", depth: 0 },
        { name: "__init__.py", depth: 1, badge: "new", badgeVariant: "green" },
        { name: "deck.py", depth: 1, highlight: true, badge: "78 cards", badgeVariant: "sky", note: "Section A" },
        { name: "llm.py", depth: 1, highlight: true, badge: "LLM config", badgeVariant: "violet", note: "Section B" },
        { name: "agents.py", depth: 1, highlight: true, badge: "1st agent", badgeVariant: "amber", note: "Section C" },
        { name: ".env", depth: 0, badge: "API key", badgeVariant: "red" },
        { name: "requirements.txt", depth: 0 },
      ]} />
    </div>
  );
}

function Lesson01Walkthrough() {
  return (
    <div className="fade-in">
      <SectionHeading sub="Section A: ~20 min">The 78-Card Deck</SectionHeading>
      <p className="text-white/70 text-sm leading-relaxed mb-4">Every tarot reading starts with a deck. Before AI agents, you need a reliable programmatic representation of all 78 cards \u2014 22 Major Arcana and 56 Minor Arcana (4 suits \u00D7 14 ranks).</p>
      <Callout type="key" title="Design Principle">Build the domain layer first. Everything above it \u2014 agents, UI, persistence \u2014 sits on top of something testable and dependency-free.</Callout>
      <CodeBlock title="nexus_tarot/deck.py \u2014 Constants">{`MAJOR_ARCANA = [
    "The Fool", "The Magician", "The High Priestess",
    "The Empress", "The Emperor", "The Hierophant",
    "The Lovers", "The Chariot", "Strength",
    "The Hermit", "Wheel of Fortune", "Justice",
    "The Hanged Man", "Death", "Temperance",
    "The Devil", "The Tower", "The Star",
    "The Moon", "The Sun", "Judgement", "The World"
]

SUITS = ["Wands", "Cups", "Swords", "Pentacles"]
RANKS = ["Ace", "2", "3", "4", "5", "6", "7", "8",
         "9", "10", "Page", "Knight", "Queen", "King"]`}</CodeBlock>

from dotenv import load_dotenv

def configure_llm(provider="openai"):
    load_dotenv()
    if provider == "openai":
        lm = dspy.LM("openai/gpt-4o-mini")
    else:
        lm = dspy.LM("ollama_chat/llama3",

      <CodeBlock title="nexus_tarot/agents.py \u2014 First Agent">{`import dspy

class QuestionAnalysisSig(dspy.Signature):
    query = dspy.InputField()
    context = dspy.InputField(default="")
    analysis = dspy.OutputField(
        desc="Themes, emotions, and angles in the query"
    )

class QuestionAnalysisAgent(dspy.Module):
    def __init__(self, lm=None):
        super().__init__()
        self.lm = lm
        self.chain = dspy.ChainOfThought(QuestionAnalysisSig)

    def forward(self, query, context=""):
        with dspy.context(lm=self.lm):
            return self.chain(
                query=query, context=context
            ).analysis`}</CodeBlock>

  );

    card_analyses = dspy.InputField()
    reader_profile = dspy.InputField()
    final_reading = dspy.OutputField(

    )

class ReadingSynthesisAgent(dspy.Module):
    def __init__(self, lm=None):
        super().__init__()
        self.lm = lm
        self.chain = dspy.ChainOfThought(ReadingSynthesisSig)

    def __init__(self, lm=None):
        self.question_agent = QuestionAnalysisAgent(lm)
        self.card_agent = CardAnalysisAgent(lm)
        self.synthesis_agent = ReadingSynthesisAgent(lm)

    def read(self, query, spread_func, profile=""):
        # Phase 1: Analyze the question
        analysis = self.question_agent(query=query)

        # Phase 2: Draw and interpret each card
        cards = spread_func()
        card_analyses = []
        for card_name, position, reversed in cards:

                card_name=card_name,
                card_position=position,
                reversed_flag=str(reversed),
                query=query,
                reader_profile=profile,

            card_analyses.append(result)

    if rising: parts.append(f"Rising {rising}")

      <SectionHeading sub="Section B: ~15 min">Structured Output</SectionHeading>
      <p className="text-white/70 text-sm leading-relaxed mb-4">Replace raw string returns with a <Code>ReadingResult</Code> dataclass. <Code>__str__()</Code> preserves backward compatibility.</p>
      <CodeBlock title="agent_reader.py \u2014 ReadingResult">{`@dataclass
class ReadingResult:
    query: str
    spread_type: str
    cards: list
    card_analyses: list[str]
    final_reading: str
    personality: str = ""

    def __str__(self):
        return self.final_reading  # backward compat`}</CodeBlock>

      <SectionHeading sub="Section C: ~25 min">Reading History</SectionHeading>
      <p className="text-white/70 text-sm leading-relaxed mb-4">JSON persistence to <Code>~/.nexus/readings.json</Code> and Counter-based pattern analysis \u2014 the payoff of structured output.</p>
      <Callout type="info" title="Why structured output matters">Because ReadingResult has named fields, persistence is trivial: <Code>dataclasses.asdict()</Code> + <Code>json.dump()</Code>. No parsing, no extraction, no fragile string manipulation.</Callout>
    </div>
  );
}

from nexus_tarot.deck import SPREADS
